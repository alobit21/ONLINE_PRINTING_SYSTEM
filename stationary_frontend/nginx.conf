server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html so React Router works correctly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html itself (so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}